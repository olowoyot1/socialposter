services:
  - type: web
    name: social-poster
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TWITTER_CALLBACK_URL
        sync: false
